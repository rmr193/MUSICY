name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Generate Native App wrappers
        run: |
          cd mobile_app
          flutter create --org com.rmr193.musicy --project-name musicy_mobile --platforms=android .

      - name: Add Internet Permission for Android Release
        run: |
          python -c "
          import os
          path = 'mobile_app/android/app/src/main/AndroidManifest.xml'
          if os.path.exists(path):
              with open(path, 'r') as f:
                  content = f.read()
              if 'android.permission.INTERNET' not in content:
                  content = content.replace('<application', '<uses-permission android:name=\"android.permission.INTERNET\"/>\n    <application')
                  with open(path, 'w') as f:
                      f.write(content)
                  print('Added Internet permission successfully')
              else:
                  print('Internet permission already exists')
          else:
              print('AndroidManifest.xml not found at ' + path)
          "

      - name: Install dependencies
        run: |
          cd mobile_app
          flutter pub get

      - name: Build release APK
        run: |
          cd mobile_app
          flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: musicy-app-release
          path: mobile_app/build/app/outputs/flutter-apk/app-release.apk
