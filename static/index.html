<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musicy - Spotify Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>

<body>
    <div class="container">
        <!-- Sidebar Container -->
        <div class="sidebar-container">
            <!-- Navigation Card -->
            <div class="sidebar-card nav-card">
                <div class="logo">
                    <i class="fa-brands fa-spotify"></i> Musicy
                </div>
                <ul class="nav-links">
                    <li class="active"><a href="#" id="home-link"><i class="fa-solid fa-house"></i> Home</a></li>
                    <li><a href="#" id="search-link"><i class="fa-solid fa-magnifying-glass"></i> Search</a></li>
                </ul>
            </div>

            <!-- Library Card -->
            <div class="sidebar-card library-sidebar-card">
                <div class="library-sidebar-header">
                    <a href="#" id="library-link" class="library-header-title">
                        <i class="fa-solid fa-book"></i> Your Library
                    </a>
                    <button class="add-playlist-btn" id="sidebar-add-playlist-btn" title="Create playlist">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
                <div class="sidebar-playlists" id="sidebar-playlists-list">
                    <!-- Dynamic playlists will be injected here: Liked Songs + custom playlists -->
                </div>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Topbar -->
            <div class="topbar">
                <div class="search-container" id="topbar-search-container" style="display: none;">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="search-input" placeholder="What do you want to listen to?"
                        autocomplete="off">
                </div>
            </div>

            <!-- Views Panel Container -->
            <div class="content-body" id="main-view-container">

                <!-- 1. HOME VIEW -->
                <div class="view-panel" id="home-view">
                    <h2 id="welcome-greeting">Good day</h2>

                    <!-- Quick Play Playlist Grid -->
                    <div class="quick-play-grid" id="quick-play-grid">
                        <!-- Dynamically populated Liked Songs + custom playlists quick cards -->
                    </div>

                    <div class="home-section">
                        <h3>Recently Played</h3>
                        <div class="recent-songs-grid" id="recent-songs-grid">
                            <p class="placeholder-text">Songs you play will appear here.</p>
                        </div>
                    </div>
                </div>

                <!-- 2. SEARCH VIEW -->
                <div class="view-panel hidden" id="search-view">
                    <h2>Songs</h2>
                    <div class="results-list" id="results-list">
                        <p class="placeholder-text">Search for a song to see results right here...</p>
                    </div>
                </div>

                <!-- 3. PLAYLIST DETAIL VIEW -->
                <div class="view-panel hidden" id="playlist-view">
                    <div class="playlist-header-wrapper" id="playlist-header-bg">
                        <div class="playlist-header-content">
                            <div class="playlist-cover-large" id="playlist-cover-large">
                                <i class="fa-solid fa-music"></i>
                            </div>
                            <div class="playlist-details">
                                <span class="playlist-tag">Playlist</span>
                                <h1 class="playlist-name-large" id="playlist-detail-name">Liked Songs</h1>
                                <div class="playlist-meta-info">
                                    <span class="playlist-owner">Musicy</span>
                                    <span class="dot-separator">•</span>
                                    <span class="playlist-track-count" id="playlist-detail-count">0 songs</span>
                                    <span class="dot-separator">•</span>
                                    <span class="playlist-total-duration" id="playlist-detail-duration">0 min</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="playlist-controls-bar">
                        <button class="playlist-play-btn" id="playlist-play-btn" title="Play">
                            <i class="fa-solid fa-play"></i>
                        </button>
                        <button class="playlist-control-icon-btn" id="playlist-shuffle-btn" title="Shuffle playlist">
                            <i class="fa-solid fa-shuffle"></i>
                        </button>
                        <button class="playlist-control-icon-btn" id="playlist-rename-btn" title="Rename playlist">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                        <button class="playlist-control-icon-btn" id="playlist-delete-btn" title="Delete playlist">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>

                    <div class="playlist-tracks-container">
                        <!-- Track table header -->
                        <div class="tracks-table-header">
                            <div class="col-index">#</div>
                            <div class="col-title">Title</div>
                            <div class="col-album">Album</div>
                            <div class="col-duration"><i class="fa-regular fa-clock"></i></div>
                            <div class="col-actions"></div>
                        </div>
                        <div class="tracks-table-body" id="playlist-tracks-list">
                            <!-- Playlist track rows -->
                        </div>
                    </div>
                </div>

                <!-- 4. LIBRARY VIEW (GRID OF ALL PLAYLISTS) -->
                <div class="view-panel hidden" id="library-view">
                    <div class="library-view-header">
                        <h2>Your Library</h2>
                    </div>
                    <div class="playlists-grid" id="library-playlists-grid">
                        <!-- Playlist cards -->
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Bottom Player -->
    <div class="player">
        <div class="player-left">
            <img src="https://via.placeholder.com/56" alt="Album Cover" id="player-cover" style="display: none;">
            <div class="track-info">
                <div class="track-name" id="player-title">No Track Selected</div>
                <div class="track-artist" id="player-artist"></div>
            </div>
            <button class="player-like-btn" id="player-like-btn" title="Like song" style="display: none;">
                <i class="fa-regular fa-heart"></i>
            </button>
        </div>

        <div class="player-center">
            <div class="controls">
                <button class="control-btn" id="player-shuffle-btn" title="Shuffle"><i
                        class="fa-solid fa-shuffle"></i></button>
                <button class="control-btn" id="prev-btn" title="Previous"><i
                        class="fa-solid fa-backward-step"></i></button>
                <button class="control-btn play-pause" id="play-pause-btn" title="Play"><i
                        class="fa-solid fa-circle-play" id="play-icon"></i></button>
                <button class="control-btn" id="next-btn" title="Next"><i class="fa-solid fa-forward-step"></i></button>
                <button class="control-btn" id="player-repeat-btn" title="Repeat"><i
                        class="fa-solid fa-repeat"></i></button>
            </div>
            <div class="progress-container">
                <span class="time" id="current-time">0:00</span>
                <div class="progress-bar">
                    <div class="progress" id="progress"></div>
                </div>
                <span class="time" id="total-time">0:00</span>
            </div>
        </div>

        <div class="player-right">
            <button class="control-btn volume-btn" id="volume-btn" title="Mute/Unmute"><i
                    class="fa-solid fa-volume-high"></i></button>
            <div class="volume-bar">
                <div class="volume-progress" id="volume-progress"></div>
            </div>
        </div>
    </div>

    <!-- Playlist Creation/Rename Modal -->
    <div class="modal-overlay hidden" id="playlist-modal">
        <div class="modal-card">
            <h3 id="modal-title">Create Playlist</h3>
            <input type="text" id="modal-input" placeholder="Playlist Name" autocomplete="off">
            <div class="modal-buttons">
                <button class="modal-btn cancel" id="modal-cancel">Cancel</button>
                <button class="modal-btn submit" id="modal-submit">Create</button>
            </div>
        </div>
    </div>

    <!-- Dropdown for Adding Track to Playlist -->
    <div class="dropdown-menu hidden" id="track-dropdown">
        <div class="dropdown-header">Add to Playlist</div>
        <div class="dropdown-options" id="dropdown-playlists-list">
            <!-- Dynamic playlist choices -->
        </div>
    </div>

    <audio id="audio-player" preload="auto"></audio>
    <script src="script.js"></script>
</body>

</html>
